<style>
  :root {
    --accent: #E63946;
    --c-bg0: #070708; --c-bg1: #0E0E10;
    --c-text: #EDECE7;
    --c-dim: rgba(237,236,231,0.55); --c-faint: rgba(237,236,231,0.32);
    --c-line: rgba(255,255,255,0.08); --c-line-strong: rgba(255,255,255,0.18);
    --c-glass-bg: rgba(255,255,255,0.04); --c-glass-border: rgba(255,255,255,0.12);
    --c-nav-bg: rgba(7,7,8,0.82);
    --c-disc-bg: rgba(14,14,16,0.82);
    --c-code-bg: rgba(0,0,0,0.28);
    --c-thumb: rgba(255,255,255,0.08); --c-thumb-hover: rgba(255,255,255,0.15);
  }
  [data-theme="light"] {
    --c-bg0: #F5F4EF; --c-bg1: #ECEAE4;
    --c-text: #0D0D0E;
    --c-dim: rgba(13,13,14,0.55); --c-faint: rgba(13,13,14,0.32);
    --c-line: rgba(0,0,0,0.08); --c-line-strong: rgba(0,0,0,0.18);
    --c-glass-bg: rgba(0,0,0,0.04); --c-glass-border: rgba(0,0,0,0.10);
    --c-nav-bg: rgba(245,244,239,0.92);
    --c-disc-bg: rgba(236,234,228,0.92);
    --c-code-bg: rgba(0,0,0,0.05);
    --c-thumb: rgba(0,0,0,0.12); --c-thumb-hover: rgba(0,0,0,0.22);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--c-bg0); color: var(--c-text); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transition: background 300ms, color 300ms; }
  body { overflow-x: hidden; }
  button { font-family: inherit; }
  ::selection { background: var(--accent); color: #fff; }
  @keyframes orbit-cw  { from { transform: rotate(0deg); }   to { transform: rotate(360deg); } }
  @keyframes orbit-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
  .orbit-rotate     { animation: orbit-cw 120s linear infinite; }
  .orbit-rotate-rev { animation: orbit-ccw 180s linear infinite; }
  .row-hover { transition: background 240ms cubic-bezier(.2,.7,.2,1), padding-left 240ms cubic-bezier(.2,.7,.2,1), border-color 240ms; }
  .row-hover:hover { background: rgba(230,57,70,0.07); padding-left: 12px; padding-right: 12px; border-color: rgba(230,57,70,0.22) !important; }
  .pill { transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s cubic-bezier(0.34,1.56,0.64,1), background 220ms, border-color 220ms, color 220ms; }
  .pill:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 32px rgba(0,0,0,0.35); }
  .pill:active { transform: scale(0.95); transition-duration: 0.1s; }
  .glass-hover { transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), border-color 0.3s, box-shadow 0.45s cubic-bezier(0.34,1.56,0.64,1); }
  .glass-hover:hover { transform: translateY(-4px) scale(1.008); border-color: var(--c-line-strong); box-shadow: 0 24px 64px rgba(0,0,0,0.25); }
  .hero-dot-grid { position: absolute; inset: 0; background-image: radial-gradient(var(--c-line-strong) 0.5px, transparent 0.5px); background-size: 32px 32px; opacity: 0.25; pointer-events: none; }

  /* ── Scroll reveal ───────────────────────────────────── */
  .reveal { opacity: 0; transform: translateY(36px); }
  .reveal.in { opacity: 1; transform: translateY(0); transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1); }
  .reveal-left { opacity: 0; transform: translateX(-36px); }
  .reveal-left.in { opacity: 1; transform: translateX(0); transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1); }
  .reveal-scale { opacity: 0; transform: scale(0.94); }
  .reveal-scale.in { opacity: 1; transform: scale(1); transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1); }
  /* stagger delays */
  .sd1 { transition-delay: 0.05s !important; } .sd2 { transition-delay: 0.12s !important; }
  .sd3 { transition-delay: 0.19s !important; } .sd4 { transition-delay: 0.26s !important; }
  .sd5 { transition-delay: 0.33s !important; } .sd6 { transition-delay: 0.40s !important; }

  /* ── Spring card ────────────────────────────────────── */
  .spring-card { transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.5s cubic-bezier(0.34,1.56,0.64,1), border-color 0.3s ease; }
  .spring-card:hover { transform: translateY(-5px) scale(1.006); box-shadow: 0 20px 56px rgba(0,0,0,0.28); border-color: var(--c-line-strong) !important; }
  /* override reveal.in specificity so spring hover stays crisp after scroll-in */
  .spring-card.in { transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.5s cubic-bezier(0.34,1.56,0.64,1), border-color 0.3s ease, opacity 0.8s cubic-bezier(0.16,1,0.3,1); }

  /* ── Nav link underline ─────────────────────────────── */
  .nav-link-u { position: relative; }
  .nav-link-u::after { content:''; position:absolute; bottom:-3px; left:0; width:0; height:1px; background:currentColor; opacity:0.5; transition: width 0.35s cubic-bezier(0.16,1,0.3,1); }
  .nav-link-u:hover::after { width:100%; }

  /* ── Theme toggle spin ──────────────────────────────── */
  .theme-btn { transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s; }
  .theme-btn:hover { transform: rotate(180deg) scale(1.15) !important; }

  /* ── Tilt disc ──────────────────────────────────────── */
  .tilt-disc { transition: transform 0.12s ease-out; will-change: transform; }

  /* ── Smooth scroll ──────────────────────────────────── */
  html { scroll-behavior: smooth; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--c-bg0); }
  ::-webkit-scrollbar-thumb { background: var(--c-thumb); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--c-thumb-hover); }

  /* ── Mobile nav ─────────────────────────────────────── */
  @media (max-width: 767px) {
    .nav-links { display: none !important; }
    .nav-live  { display: none !important; }
    .spring-card:hover { transform: none; box-shadow: none; }
    .glass-hover:hover { transform: none; box-shadow: none; }
    .row-hover:hover { padding-left: 0 !important; padding-right: 0 !important; }
    .tilt-disc { transition: none; }
  }
</style>

<script type="text/babel">
// ── tweaks-panel ─────────────────────────────────────────────────────────────
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;
    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
    background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}
  .twk-swatch::-webkit-color-swatch{border:0;border-radius:5.5px}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return (
    <button onClick={() => setOpen(true)} style={{ position: 'fixed', bottom: 16, right: 16, zIndex: 2147483646, padding: '8px 14px', background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.12)', borderRadius: 999, color: '#EDECE7', fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', cursor: 'pointer' }}>Tweaks</button>
  );
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

// ── hifi-a ───────────────────────────────────────────────────────────────────
const C = {
  bg0: 'var(--c-bg0)', bg1: 'var(--c-bg1)', bg2: 'var(--c-bg1)',
  line: 'var(--c-line)', lineStrong: 'var(--c-line-strong)',
  text: 'var(--c-text)', dim: 'var(--c-dim)', faint: 'var(--c-faint)',
  accent: 'var(--accent, #E63946)',
  glassBg: 'var(--c-glass-bg)', glassBorder: 'var(--c-glass-border)',
};
const FONT_DISP = `'Inter Tight', Inter, system-ui, sans-serif`;
const FONT_SANS = `'Inter', system-ui, sans-serif`;
const FONT_MONO = `'JetBrains Mono', ui-monospace, monospace`;

// ── Animation hooks ────────────────────────────────────────────────────────
function useReveal(cls = 'reveal', threshold = 0.12) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    // If already in viewport (anchor nav, first-paint) — reveal immediately, no flicker
    const r = el.getBoundingClientRect();
    if (r.top < window.innerHeight && r.bottom > 0) {
      el.classList.add('in');
      return;
    }
    el.classList.add(cls);
    // threshold:0 fires on first pixel visible; rootMargin catches near-edge elements
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('in'); io.disconnect(); }
    }, { threshold: 0, rootMargin: '0px 0px 60px 0px' });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}

function useStaggerReveal(count, threshold = 0.1) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const children = [...el.children];
    const r = el.getBoundingClientRect();
    if (r.top < window.innerHeight && r.bottom > 0) {
      children.forEach(c => c.classList.add('in'));
      return;
    }
    children.forEach((child, i) => {
      child.classList.add('reveal');
      if (i > 0) child.classList.add(`sd${Math.min(i, 6)}`);
    });
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { children.forEach(c => c.classList.add('in')); io.disconnect(); }
    }, { threshold: 0, rootMargin: '0px 0px 60px 0px' });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}

function useScrollParallax(strength = 0.1) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    let raf = null;
    const tick = () => {
      if (ref.current) ref.current.style.transform = `translateY(${window.scrollY * strength}px)`;
      raf = null;
    };
    const onScroll = () => { if (!raf) raf = requestAnimationFrame(tick); };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => { window.removeEventListener('scroll', onScroll); if (raf) cancelAnimationFrame(raf); };
  }, [strength]);
  return ref;
}

function useViewport() {
  const [w, setW] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return { isMobile: w < 768, isTablet: w < 1024, w };
}

function useMouseTilt(strength = 5) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.classList.add('tilt-disc');
    let current = { x: 0, y: 0 };
    let target  = { x: 0, y: 0 };
    let raf = null;
    const lerp = (a, b, t) => a + (b - a) * t;
    const animate = () => {
      current.x = lerp(current.x, target.x, 0.1);
      current.y = lerp(current.y, target.y, 0.1);
      el.style.transform = `perspective(900px) rotateX(${current.y}deg) rotateY(${current.x}deg) scale(1.02)`;
      raf = requestAnimationFrame(animate);
    };
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      target.x =  ((e.clientX - r.left - r.width  / 2) / (r.width  / 2)) * strength;
      target.y = -((e.clientY - r.top  - r.height / 2) / (r.height / 2)) * strength;
    };
    const onEnter = () => { raf = requestAnimationFrame(animate); };
    const onLeave = () => {
      target = { x: 0, y: 0 };
      setTimeout(() => { cancelAnimationFrame(raf); el.style.transform = ''; }, 400);
    };
    el.addEventListener('mouseenter', onEnter);
    el.addEventListener('mousemove',  onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => {
      cancelAnimationFrame(raf);
      el.removeEventListener('mouseenter', onEnter);
      el.removeEventListener('mousemove',  onMove);
      el.removeEventListener('mouseleave', onLeave);
    };
  }, [strength]);
  return ref;
}

const Eyebrow = ({ children, accent, dim, style }) => (
  <span style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', color: accent ? C.accent : (dim ? C.faint : C.dim), ...style }}>{children}</span>
);

const Glass = ({ children, style, hover, noSpring, ...rest }) => (
  <div className={`${noSpring ? '' : 'spring-card'} ${hover ? 'glass-hover' : ''}`} style={{ background: C.glassBg, border: `1px solid ${C.glassBorder}`, backdropFilter: 'blur(24px) saturate(140%)', WebkitBackdropFilter: 'blur(24px) saturate(140%)', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.05)', borderRadius: 12, ...style }} {...rest}>{children}</div>
);

const Pill = ({ children, accent, filled, ghost, style, onClick, large }) => (
  <button onClick={onClick} className="pill" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: large ? '12px 20px' : '8px 14px', borderRadius: 999, border: `1px solid ${accent ? C.accent : C.lineStrong}`, background: filled ? (accent ? C.accent : C.text) : (ghost ? 'transparent' : 'rgba(255,255,255,0.03)'), color: filled ? (accent ? '#fff' : C.bg0) : (accent ? C.accent : C.text), fontFamily: FONT_MONO, fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', cursor: 'pointer', ...style }}>{children}</button>
);

const CircleBtn = ({ children, size = 40, accent, filled, style }) => (
  <span style={{ width: size, height: size, borderRadius: '50%', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: `1px solid ${accent ? C.accent : C.lineStrong}`, background: filled ? (accent ? C.accent : C.text) : 'transparent', color: filled ? (accent ? '#fff' : C.bg0) : (accent ? C.accent : C.text), fontFamily: FONT_MONO, fontSize: 11, flexShrink: 0, ...style }}>{children}</span>
);

const Sec = ({ idx, name, vertLabel, children, padTop = 80, padBottom = 80, style, id }) => {
  const { isMobile } = useViewport();
  const ref = useReveal('reveal', 0.08);
  const px = isMobile ? 20 : 48;
  const pt = isMobile ? Math.max(48, padTop * 0.6) : padTop;
  const pb = isMobile ? Math.max(48, padBottom * 0.6) : padBottom;
  return (
    <section ref={ref} id={id} style={{ position: 'relative', borderTop: `1px solid ${C.line}`, padding: `${pt}px ${px}px ${pb}px`, ...style }}>
      <div style={{ position: 'absolute', top: 16, left: px, right: px, display: 'flex', justifyContent: 'space-between' }}>
        <Eyebrow>{idx} / {name}</Eyebrow>
        {vertLabel && !isMobile ? <Eyebrow dim>{vertLabel}</Eyebrow> : null}
      </div>
      {children}
    </section>
  );
};

const Logo = () => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>

function RoadmapTimeline() {
  const [activeIdx, setActiveIdx] = React.useState(0);
  const itemRefs = React.useRef([]);
  const lineRef = React.useRef(null);
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    const observers = [];
    itemRefs.current.forEach((el, i) => {
      if (!el) return;
      const io = new IntersectionObserver(([e]) => {
        if (e.isIntersecting) setActiveIdx(prev => Math.max(prev, i));
      }, { threshold: 0.6, rootMargin: '0px 0px -20% 0px' });
      io.observe(el);
      observers.push(io);
    });
    return () => observers.forEach(o => o.disconnect());
  }, []);

  React.useEffect(() => {
    if (!lineRef.current || !containerRef.current || !itemRefs.current[activeIdx]) return;
    const container = containerRef.current.getBoundingClientRect();
    const active = itemRefs.current[activeIdx].getBoundingClientRect();
    const progress = (active.top + active.height / 2) - container.top;
    lineRef.current.style.height = `${Math.max(0, progress)}px`;
  }, [activeIdx]);

  return (
    <Glass style={{ padding: 28, position: 'relative' }}>
      <div ref={containerRef} style={{ position: 'relative', paddingLeft: 24 }}>
        {/* base grey line */}
        <div style={{ position: 'absolute', top: 8, bottom: 8, left: 5, width: 1, background: C.line }} />
        {/* animated red progress line */}
        <div ref={lineRef} style={{ position: 'absolute', top: 8, left: 5, width: 1, background: C.accent, transition: 'height 0.6s cubic-bezier(0.16,1,0.3,1)', height: 0 }} />
        {ROADMAP_ITEMS.map((r, i) => (
          <div key={i} ref={el => itemRefs.current[i] = el} style={{ position: 'relative', paddingBottom: 22 }}>
            <div style={{
              position: 'absolute', left: -22, top: 4, width: 11, height: 11, borderRadius: '50%',
              background: i <= activeIdx ? C.accent : C.bg1,
              border: `1px solid ${i <= activeIdx ? C.accent : C.lineStrong}`,
              transition: 'background 0.4s ease, border-color 0.4s ease',
              boxShadow: i === activeIdx ? `0 0 8px ${C.accent}` : 'none',
            }} />
            <div style={{ display: 'flex', gap: 14, alignItems: 'baseline' }}>
              <Eyebrow accent={i <= activeIdx} dim={i > activeIdx}>{r.q}</Eyebrow>
              <span style={{ fontFamily: FONT_DISP, fontSize: 18, fontWeight: 300, color: i <= activeIdx ? C.text : C.dim, transition: 'color 0.4s ease' }}>{r.t}</span>
            </div>
            <p style={{ fontSize: 12.5, color: C.dim, marginTop: 6, fontFamily: FONT_SANS }}>{r.d}</p>
          </div>
        ))}
      </div>
    </Glass>
  );
}

function HiFiA({ isDark, onToggle }) {

    <div style={{ background: C.bg0, color: C.text, fontFamily: FONT_SANS, minHeight: '100vh' }}>

      <Hero />

      <Institutional />
      <Chains />

  );
}

// ── Root ─────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = { accent: '#E63946', orbits: true };

function Root() {
  const [isDark, setIsDark] = React.useState(true);
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const toggleTheme = () => {
    setIsDark(d => {
      const next = !d;
      document.documentElement.dataset.theme = next ? '' : 'light';
      return next;
    });
  };

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', t.accent);
    document.querySelectorAll('.orbit-rotate, .orbit-rotate-rev').forEach(el => {
      el.style.animationPlayState = t.orbits ? 'running' : 'paused';
    });
  }, [t.accent, t.orbits]);

  return (
    <>
      <HiFiA isDark={isDark} onToggle={toggleTheme} />
      <TweaksPanel>
        <TweakSection label="Brand" />
        <TweakColor label="Accent" value={t.accent} onChange={(v) => setTweak('accent', v)} />
        <TweakToggle label="Orbital animation" value={t.orbits} onChange={(v) => setTweak('orbits', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
