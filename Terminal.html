const F_SANS = `'Inter', system-ui, sans-serif`;
const F_MONO = `'JetBrains Mono', ui-monospace, monospace`;

const Glass = ({ children, style, ...rest }) => (

function NotionalChart() {
  const r = rand(42);
  const pts = Array.from({ length: 90 }, (_, i) => { const base = 30 + i * 0.6; return base + r() * 14; });
  const max = Math.max(...pts), min = Math.min(...pts);
  const norm = pts.map(p => 100 - ((p - min) / (max - min)) * 90);
  const W = 100, H = 100;
  const path = norm.map((y, i) => `${i === 0 ? 'M' : 'L'} ${(i / (norm.length - 1)) * W} ${y}`).join(' ');
  const area = `${path} L ${W} ${H} L 0 ${H} Z`;
  return (
    <Glass style={{ padding: 22, minHeight: 360 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <Eb>NOTIONAL · 30D · ATTESTED</Eb>
          <div style={{ fontFamily: F_DISP, fontSize: 40, fontWeight: 200, letterSpacing: '-0.025em', color: TC.text, marginTop: 8 }}>$1,418,302,940 <span style={{ fontSize: 14, color: TC.accent }}>↑ 12.4%</span></div>
        </div>
        <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
          {[['HIGH', '$54.2M'], ['LOW', '$31.6M'], ['AVG', '$47.3M']].map(([l, v]) => (
            <div key={l} style={{ textAlign: 'right' }}>
              <Eb dim>{l}</Eb>
              <div style={{ fontFamily: F_MONO, fontSize: 12, color: TC.text, marginTop: 4 }}>{v}</div>
            </div>
          ))}
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: '100%', height: 220, marginTop: 18, display: 'block' }}>
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#fff" stopOpacity="0.18" />
            <stop offset="100%" stopColor="#fff" stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0, 25, 50, 75].map(y => <line key={y} x1="0" y1={y} x2={W} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="0.2" />)}
        <path d={area} fill="url(#cg)" />
        <path d={path} stroke={TC.text} strokeWidth="0.4" fill="none" vectorEffect="non-scaling-stroke" />
        <circle cx={W} cy={norm[norm.length - 1]} r="0.8" fill="#E63946" />
      </svg>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8 }}>
        {['MAR 28', 'APR 04', 'APR 11', 'APR 18', 'APR 25'].map(d => <Eb key={d} dim>{d}</Eb>)}
      </div>
    </Glass>
  );
}

        <div><Eb dim>SPREAD</Eb><div style={{ fontFamily: F_DISP, fontSize: 22, fontWeight: 200, color: TC.text, marginTop: 4 }}>78<span style={{ fontSize: 11, color: TC.dim }}>bps</span></div></div>
        <div><Eb dim>MID</Eb><div style={{ fontFamily: F_MONO, fontSize: 14, color: TC.text, marginTop: 6 }}>64,249.00</div></div>
        <div>
          <Eb dim>DEPTH ±2%</Eb>
          <div style={{ display: 'flex', gap: 2, marginTop: 6, alignItems: 'flex-end' }}>
            {[14,22,18,28,16,30,24,12,8,18,26].map((h,i) => <div key={i} style={{ width: 4, height: h, background: TC.text, opacity: 0.7 }} />)}

function LiveTransactions() {
  const seedRows = () => {
    const r = rand(Date.now() % 10000);
    const types = ['LOCK_INIT', 'SETTLE', 'CLAIM', 'REVERT', 'LOCK_INIT', 'SETTLE'];
    const pairs = ['BTC→USDC', 'BTC→USDT', 'ETH→USDC', 'BTC→USDC', 'ETH→USDT'];
    const desks = ['Maker_4f', 'Vault_9c', 'Maker_3e', 'Desk_71', 'Vault_c8', 'Maker_22', 'Desk_a1', 'Vault_ff'];
    return Array.from({ length: 14 }, (_, i) => {
      const type = types[Math.floor(r() * types.length)];
      return {
        ts: `${String(Math.floor(r() * 24)).padStart(2,'0')}:${String(Math.floor(r() * 60)).padStart(2,'0')}:${String(Math.floor(r() * 60)).padStart(2,'0')}`,
        type,
        hash: '0x' + Math.floor(r() * 0xffffffff).toString(16).padStart(8,'0').slice(0,4) + '…' + Math.floor(r() * 0xffff).toString(16).padStart(4,'0'),
        pair: pairs[Math.floor(r() * pairs.length)],
        size: '$' + (10000 + Math.floor(r() * 990000)).toLocaleString(),
        chain: ['BTC', 'ETH', 'BTC', 'ETH'][Math.floor(r() * 4)],
        desk: desks[Math.floor(r() * desks.length)],
        status: type === 'REVERT' ? 'expired' : (type === 'LOCK_INIT' ? 'open' : 'finalized'),
      };
    });
  };
  const [rows, setRows] = React.useState(seedRows);
  React.useEffect(() => {
    const id = setInterval(() => setRows(seedRows()), 4000);
    return () => clearInterval(id);
  }, []);
  return (
    <Glass style={{ padding: 0, minHeight: 460 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', padding: '20px 22px 14px', borderBottom: `1px solid ${TC.line}` }}>
        <Eb>LIVE TRANSACTIONS · ALL CHAINS</Eb>
        <div style={{ display: 'flex', gap: 12 }}>
          <Eb accent>● STREAMING</Eb>
          <Eb dim>14 OF 4,218 TODAY</Eb>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '90px 110px 130px 110px 130px 80px 130px 90px', gap: 16, padding: '12px 22px', borderBottom: `1px solid ${TC.line}`, fontFamily: F_MONO, fontSize: 9, color: TC.faint, letterSpacing: '0.1em', textTransform: 'uppercase' }}>
        <span>TIME</span><span>EVENT</span><span>TX HASH</span><span>PAIR</span><span>SIZE</span><span>CHAIN</span><span>COUNTERPARTY</span><span style={{ textAlign: 'right' }}>STATUS</span>
      </div>
      {rows.map((r, i) => (
        <div key={i} style={{ display: 'grid', gridTemplateColumns: '90px 110px 130px 110px 130px 80px 130px 90px', gap: 16, padding: '11px 22px', borderBottom: i < rows.length - 1 ? `1px solid rgba(255,255,255,0.04)` : 'none', fontFamily: F_MONO, fontSize: 11, alignItems: 'center', background: i === 0 ? 'rgba(255,255,255,0.025)' : 'transparent' }}>
          <span style={{ color: TC.faint }}>{r.ts}</span>
          <span style={{ color: r.type === 'REVERT' ? TC.accent : (r.type === 'SETTLE' || r.type === 'CLAIM' ? TC.green : TC.text) }}>{r.type}</span>
          <span style={{ color: TC.dim }}>{r.hash}</span>
          <span style={{ color: TC.text }}>{r.pair}</span>
          <span style={{ color: TC.text }}>{r.size}</span>
          <span style={{ color: TC.dim }}>{r.chain}</span>
          <span style={{ color: TC.dim }}>{r.desk}</span>
          <span style={{ textAlign: 'right', color: r.status === 'expired' ? TC.accent : (r.status === 'finalized' ? TC.green : TC.dim) }}>{r.status}</span>
        </div>
      ))}
    </Glass>
  );
}

function VolumeByChain() {
  const data = [
    { n: 'BTC',  p: 46, c: TC.text },
    { n: 'ETH',  p: 22, c: 'rgba(255,255,255,0.7)' },
    { n: 'USDT', p: 18, c: 'rgba(255,255,255,0.5)' },
    { n: 'USDC', p: 14, c: TC.accent },
  ];
  let acc = 0;
  const r2 = 38, cx = 50, cy = 50;
  const arcs = data.map(d => {
    const start = (acc / 100) * Math.PI * 2 - Math.PI / 2;
    acc += d.p;
    const end = (acc / 100) * Math.PI * 2 - Math.PI / 2;
    const large = d.p > 50 ? 1 : 0;
    const x1 = cx + r2 * Math.cos(start), y1 = cy + r2 * Math.sin(start);
    const x2 = cx + r2 * Math.cos(end),   y2 = cy + r2 * Math.sin(end);
    return { d: `M ${cx} ${cy} L ${x1} ${y1} A ${r2} ${r2} 0 ${large} 1 ${x2} ${y2} Z`, c: d.c };
  });
  return (
    <Glass style={{ padding: 22, minHeight: 360 }}>
      <Eb>VOLUME BY CHAIN · 30D</Eb>
      <div style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: 24, marginTop: 18, alignItems: 'center' }}>
        <svg viewBox="0 0 100 100" style={{ width: 160, height: 160 }}>
          {arcs.map((a, i) => <path key={i} d={a.d} fill={a.c} />)}
          <circle cx="50" cy="50" r="24" fill={TC.bg0} />
          <text x="50" y="48" textAnchor="middle" fontFamily={F_MONO} fontSize="3.5" fill={TC.faint} letterSpacing="0.1em">TOTAL</text>
          <text x="50" y="56" textAnchor="middle" fontFamily={F_DISP} fontSize="9" fontWeight="200" fill={TC.text}>$1.42B</text>
        </svg>
        <div>
          {data.map(d => (
            <div key={d.n} style={{ display: 'grid', gridTemplateColumns: '12px 60px 1fr 50px', gap: 10, alignItems: 'center', padding: '8px 0', borderBottom: `1px solid ${TC.line}` }}>
              <span style={{ width: 10, height: 10, background: d.c, display: 'block' }} />
              <span style={{ fontFamily: F_DISP, fontSize: 16, fontWeight: 300, color: TC.text }}>{d.n}</span>
              <div style={{ height: 2, background: 'rgba(255,255,255,0.06)' }}><div style={{ width: `${d.p * 2}%`, maxWidth: '100%', height: '100%', background: d.c }} /></div>
              <Eb style={{ textAlign: 'right' }}>{d.p}%</Eb>
            </div>
          ))}
        </div>
      </div>
    </Glass>
  );
}

function Terminal() {
  const [block, setBlock] = React.useState(19488302);
  const [ts, setTs] = React.useState('12:04:21');
  React.useEffect(() => {
    const id = setInterval(() => {
      setBlock(b => b + 1);
      const d = new Date();
      setTs(`${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')}`);
    }, 1000);
    return () => clearInterval(id);
  }, []);

  return (
    <div style={{ background: TC.bg0, color: TC.text, minHeight: '100vh', fontFamily: F_SANS }}>
      <Nav />
      <StatusBar block={block} ts={ts} />

      <div style={{ padding: '0 20px 20px', display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 20 }}>
        <MarketCap />
        <Leaderboard />
      </div>

      </div>

      <footer style={{ borderTop: `1px solid ${TC.line}`, padding: '24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: TC.bg1 }}>
        <div style={{ display: 'flex', gap: 24, alignItems: 'center' }}>

  );
}
